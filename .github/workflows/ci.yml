name: CI

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.3'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test:run

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
